<h1>NLP 方法演化脉络图</h1>
<p class="sub">从“拿到一个 NLP 任务”开始，按任务流程串联预处理、词表示、语言模型、分类、序列标注、Transformer、预训练、Prompting、RLHF、RAG、多模态和伦理安全。</p>

const D = [{"num": "0", "color": "#6B7280", "title": "任务入口：拿到一个 NLP 任务先判断什么", "sub": "先定任务类型、输入输出、数据、评价指标，再选方法", "methods": [{"name": "任务定义 Task Framing", "tag": "分类/标注/生成/检索/多模态", "what": "拿到 NLP 任务时，第一步不是直接选模型，而是判断：输入是什么、输出是什么、输出单位是什么、有没有标注数据、是否需要生成文本、是否需要检索外部知识。这个判断会直接决定后面走分类、序列标注、语言建模、检索增强生成、多模态或对齐路线。", "steps": [{"t": "确定输入输出", "d": "输入可以是句子、文档、对话、图片+文字、知识库；输出可以是类别、token标签、下一个词、完整回答、排序结果。"}, {"t": "确定任务类型", "d": "文档→标签：Text Classification；token→标签：Sequence Labelling；上下文→下一个词：Language Modelling；query→document：Retrieval；image+text→answer：Multimodal。"}, {"t": "确定数据条件", "d": "有大量标注数据可以监督训练；标注少可以用预训练+微调；无标注可以用 zero-shot / few-shot / prompting；知识更新快则考虑 RAG。"}, {"t": "确定评价指标", "d": "分类常用 Accuracy / Precision / Recall / F1；语言模型常用 Perplexity；检索常用 Precision@k / Recall@k / MRR / MAP；生成任务还要看人工评价和事实性。"}], "flows": [["任务描述", "→", "输入/输出", "→", "数据条件", "→", "评价指标", "→", "选择方法路线"]], "formulas": [{"lbl": "总思路", "f": "method = f(task_type, data_size, label_available, knowledge_need, risk_level)"}], "pros": ["避免一开始就乱用大模型", "能把整门课知识串成决策树", "考试答题时结构非常清晰"], "cons": ["需要先理解每类任务的输出形式", "有些真实任务会混合多个子任务"], "why": "明确任务类型后，下一步通常是把原始文本处理成模型能读的 token 或子词。"}, {"name": "数据划分与评价 Evaluation", "tag": "train/dev/test + 指标", "what": "任何 NLP 方法都要用数据验证效果。训练集用于学习参数，开发集用于调参和选择模型，测试集只在最后使用。不同任务指标不同，不能只看 accuracy，尤其类别不平衡时要看 macro-F1。", "steps": [{"t": "划分数据", "d": "常见划分：train/dev/test = 70/15/15 或 80/10/10。dev 用来调超参数，test 用来报告最终效果。"}, {"t": "分类任务", "d": "Accuracy 看整体对了多少；Precision 看预测为正的里面多少是真的；Recall 看真的正例被找回多少；F1 是 Precision 和 Recall 的调和平均。"}, {"t": "语言模型", "d": "用 Perplexity 衡量模型对测试文本的困惑程度；越低说明模型越能预测真实文本。"}, {"t": "检索任务", "d": "看 top-k 结果是否包含相关文档：Precision@k、Recall@k、MRR、MAP。"}], "flows": [["全部数据", "→", "train 学参数", "→", "dev 调模型", "→", "test 最终报告"]], "formulas": [{"lbl": "分类指标", "f": "Precision = TP/(TP+FP)\nRecall = TP/(TP+FN)\nF1 = 2PR/(P+R)"}, {"lbl": "Perplexity", "f": "PP(W) = P(w1,w2,...,wN)^(-1/N)\n     = exp( - 1/N * sum_i log P(w_i | context) )"}], "pros": ["能公平比较方法", "dev/test 分离避免过拟合测试集", "不同任务有对应指标"], "cons": ["自动指标不一定等于人类质量", "生成任务尤其难评价"], "why": "评价方式确定后，才知道后面每个方法到底在优化什么。"}]}, {"num": "1", "color": "#534AB7", "title": "预处理 Preprocessing", "sub": "原始文本 → token / 子词 / 规范化文本", "methods": [{"name": "句子切分 Sentence Segmentation", "tag": "规则 → 分类器", "what": "把长文本切成句子。难点是句号不一定代表句子结束，例如 U.S.A.、Mr. Brown、Yahoo! 都可能让简单规则出错。更好的方法是把每个候选标点看作二分类问题。", "steps": [{"t": "找候选边界", "d": "通常先找 . ? ! 等符号。"}, {"t": "规则方法", "d": "遇到标点就切，或标点后面是大写字母才切；简单但容易被缩写误导。"}, {"t": "机器学习方法", "d": "对每个候选点提取前后词、大小写、缩写、词性等特征，用 Logistic Regression 判断是否句末。"}, {"t": "输出", "d": "得到句子列表，为后续 tokenization、POS、NER、分类做准备。"}], "flows": [["文本", "→", "候选标点", "→", "上下文特征", "→", "二分类", "→", "句子"]], "formulas": [{"lbl": "候选句末分类", "f": "P(EOS | features) = sigmoid(w · x + b)"}], "pros": ["比纯规则更能处理缩写", "错误边界减少后续连锁错误"], "cons": ["需要标注数据", "语言和领域变化会影响规则"], "why": "句子切好后，需要进一步切成 token 或 subword。"}, {"name": "分词 Tokenization", "tag": "word / MaxMatch / BPE / WordPiece", "what": "分词是把句子拆成模型处理的基本单位。英文可以用空格作为起点，但会遇到缩写、标点、连字符、hashtag。中文没有空格，常用最大匹配。现代 Transformer/LLM 通常使用 BPE 或 WordPiece 这类子词分词。", "steps": [{"t": "英文词级分词", "d": "处理标点、缩写、数字、连字符、URL、emoji、hashtag。"}, {"t": "中文 MaxMatch", "d": "从当前位置开始，匹配词典里最长的词；匹配后移动指针。"}, {"t": "BPE", "d": "从字符开始，反复合并语料中最频繁的相邻字符对，形成子词词表。"}, {"t": "WordPiece", "d": "与 BPE 相似，但合并标准更偏向最大化语言模型似然，BERT 使用 WordPiece。"}], "flows": [["句子", "→", "词级切分", "或", "子词切分", "→", "token ids"]], "formulas": [{"lbl": "MaxMatch", "f": "word = argmax_{w in V, text.startswith(w)} length(w)"}, {"lbl": "BPE 合并", "f": "repeat: merge(a,b) where count(a b) is maximal"}], "pros": ["BPE/WordPiece 能处理 OOV", "子词方法适合大模型", "常见词可以保留完整"], "cons": ["子词不一定有清晰语义", "中文最大匹配容易受歧义影响"], "why": "分词后仍会有 running/runs/ran 这类词形变化，需要词形规范化。"}, {"name": "词形规范化 Normalisation", "tag": "stemming / lemmatisation / stopwords", "what": "把形式不同但含义相关的词合并，减少词表稀疏。Stemming 是按规则削后缀，速度快但粗糙；Lemmatization 使用词典和词性，结果通常是真实词。Stopword removal 只适合部分词袋任务，不适合所有任务。", "steps": [{"t": "大小写统一", "d": "把 Apple/apple 统一，除非大小写本身有用，例如 NER。"}, {"t": "Stemming", "d": "Porter Stemmer 等规则方法，把 computational、computing 等切到相近词干。"}, {"t": "Lemmatization", "d": "结合词典和词性，把 was→be，running→run。"}, {"t": "停用词处理", "d": "the, is, of 等可以在 BOW 分类/检索中删除；但 not 对情感分析很关键，不能随便删。"}], "flows": [["tokens", "→", "case folding", "→", "stemming/lemmatization", "→", "optional stopword removal"]], "formulas": [{"lbl": "目标", "f": "V_raw  →  V_normalised  with |V_normalised| < |V_raw|"}], "pros": ["减少词表大小", "缓解数据稀疏", "传统模型中很有用"], "cons": ["可能损失语义差异", "神经/Transformer 模型中不一定需要"], "why": "预处理完成后，模型仍不能直接理解 token，需要把 token 变成数值表示。"}]}, {"num": "2", "color": "#0F6E56", "title": "词表示 Word Representation", "sub": "token → 数字向量：稀疏、密集、静态、上下文化", "methods": [{"name": "One-hot 与 Bag-of-Words", "tag": "离散稀疏表示", "what": "One-hot 给词表中每个词一个独立维度；Bag-of-Words 把文档表示成词频向量。它们简单直观，但完全不知道词与词之间的语义相似度。", "steps": [{"t": "建立词表", "d": "把训练集中出现过的词编号，词表大小为 |V|。"}, {"t": "One-hot", "d": "词 i 的向量只有第 i 位为 1，其余为 0。"}, {"t": "BOW", "d": "文档向量的每一维记录对应词出现次数。"}, {"t": "用于分类", "d": "BOW/one-hot 可以输入 Naive Bayes、Logistic Regression、SVM。"}], "flows": [["tokens", "→", "vocabulary", "→", "one-hot/BOW", "→", "传统分类器"]], "formulas": [{"lbl": "One-hot", "f": "e_i = [0, ..., 1, ..., 0],  dim(e_i)=|V|"}], "pros": ["简单、可解释", "适合传统机器学习", "无需训练词向量"], "cons": ["维度高且稀疏", "dog 和 cat 没有相似度", "词序丢失"], "why": "为了让相似词距离更近，需要 TF-IDF、共现统计或神经词向量。"}, {"name": "TF-IDF", "tag": "词频 × 逆文档频率", "what": "TF-IDF 给文档里的词加权：在当前文档频繁出现、但在整个语料不常见的词更重要。它常用于信息检索和传统文本分类。", "steps": [{"t": "计算 TF", "d": "词在当前文档中出现越多，TF 越高。"}, {"t": "计算 IDF", "d": "词出现在越多文档中，IDF 越低，例如 the, is。"}, {"t": "相乘得到权重", "d": "TF-IDF(w,d)=TF(w,d)*IDF(w)。"}, {"t": "形成文档向量", "d": "每个文档是 |V| 维稀疏向量，可用于分类或检索。"}], "flows": [["文档", "→", "TF", "×", "IDF", "→", "加权稀疏向量"]], "formulas": [{"lbl": "TF-IDF", "f": "tfidf(w,d) = tf(w,d) * log(N / df(w))"}], "pros": ["自动降低高频虚词权重", "强 baseline", "实现快"], "cons": ["仍是稀疏向量", "不理解同义词", "不能处理上下文多义"], "why": "TF-IDF 仍然不懂语义相似性，所以引出基于共现的语义表示。"}, {"name": "Count-based / PMI / SVD", "tag": "Distributional Hypothesis", "what": "基于分布假设：一个词的含义可以从它周围出现的词推断。先统计词-词共现矩阵，再用 PMI 加权，最后用 SVD 降维得到密集向量。", "steps": [{"t": "统计共现矩阵", "d": "窗口大小 ±k，记录词 x 和词 y 共同出现次数。"}, {"t": "PMI 加权", "d": "判断两个词共同出现是否高于随机独立情况下的期望。"}, {"t": "PPMI", "d": "负 PMI 通常截断为 0。"}, {"t": "SVD 降维", "d": "把高维矩阵压缩成 k 维密集表示。"}], "flows": [["语料", "→", "共现矩阵", "→", "PMI/PPMI", "→", "SVD", "→", "词向量"]], "formulas": [{"lbl": "PMI", "f": "PMI(x,y) = log2( P(x,y) / (P(x)P(y)) )\nPPMI(x,y) = max(PMI(x,y), 0)"}, {"lbl": "SVD", "f": "M ≈ U_k Σ_k V_k^T"}], "pros": ["能捕捉全局共现信息", "向量开始有语义结构", "可解释性比神经方法强"], "cons": ["共现矩阵巨大", "SVD 计算成本高", "新增语料需重算"], "why": "共现矩阵方法太重，于是引出用神经网络高效学习词向量的 Word2Vec。"}, {"name": "Word2Vec", "tag": "Skip-gram / CBOW / Negative Sampling", "what": "Word2Vec 用一个浅层神经网络通过预测任务学习词向量。Skip-gram 是用中心词预测上下文；CBOW 是用上下文预测中心词。训练后，权重矩阵中的每一行就是词向量。", "steps": [{"t": "生成训练样本", "d": "滑动窗口中，中心词和上下文词构成正样本。"}, {"t": "Skip-gram", "d": "输入中心词 w，预测附近词 c。"}, {"t": "负采样", "d": "除了真实上下文词，还采样若干随机噪声词，让模型区分真上下文和假上下文。"}, {"t": "更新向量", "d": "用梯度下降更新中心词向量和上下文词向量。"}], "flows": [["语料窗口", "→", "正样本(w,c)", "→", "负样本(w,n)", "→", "sigmoid 点积", "→", "更新 embedding"]], "formulas": [{"lbl": "Skip-gram + Negative Sampling", "f": "L = log σ(v_w · u_c) + sum_i log σ(-v_w · u_{n_i})"}, {"lbl": "类比", "f": "v(king) - v(man) + v(woman) ≈ v(queen)"}], "pros": ["训练高效", "密集低维", "能捕捉语义相似和类比关系"], "cons": ["每个词只有一个向量", "bank 的银行/河岸无法区分", "上下文无关"], "why": "静态词向量无法处理一词多义，因此引出上下文化表示，如 ELMo、BERT。"}, {"name": "GloVe", "tag": "global co-occurrence vectors", "what": "GloVe 结合全局共现统计和神经向量学习。它希望两个词向量的点积能够接近它们共现次数的对数，因此既利用全局统计，又得到密集词向量。", "steps": [{"t": "构建共现矩阵", "d": "统计每个词对的全局共现次数 X_ij。"}, {"t": "设置目标", "d": "让 w_i^T w_j + b_i + b_j 接近 log X_ij。"}, {"t": "加权训练", "d": "高频词不过分主导，低频噪声不过分影响。"}, {"t": "输出向量", "d": "训练完成后得到词向量，可用于相似度、分类、初始化。"}], "flows": [["全局共现矩阵", "→", "加权最小二乘", "→", "词向量"]], "formulas": [{"lbl": "GloVe objective", "f": "J = sum_{i,j} f(X_ij)(w_i^T w_j + b_i + b_j - log X_ij)^2"}], "pros": ["利用全局共现", "词向量质量好", "比纯 SVD 更灵活"], "cons": ["仍是静态词向量", "需要预先统计共现矩阵"], "why": "GloVe 依然不能根据句子改变词义，于是现代 NLP 转向 Transformer 的上下文化表示。"}]}, {"num": "3", "color": "#854F0B", "title": "语言建模 Language Modelling", "sub": "预测下一个词，衡量文本概率，也支持生成", "methods": [{"name": "N-gram LM", "tag": "MLE + smoothing", "what": "N-gram 语言模型用前 n-1 个词预测当前词。它基于计数，非常可解释，但会遇到严重稀疏问题：很多合理短语训练集中没出现，MLE 概率会变成 0。", "steps": [{"t": "链式法则", "d": "把句子概率拆成每个词的条件概率连乘。"}, {"t": "Markov 假设", "d": "只看最近 n-1 个词，而不是全部历史。"}, {"t": "MLE 估计", "d": "用计数 C(context, word)/C(context) 估计条件概率。"}, {"t": "平滑", "d": "用 Laplace、Add-k、Kneser-Ney、Interpolation 处理未见 n-gram。"}], "flows": [["语料", "→", "n-gram counts", "→", "MLE", "→", "smoothing", "→", "P(sentence)"]], "formulas": [{"lbl": "Bigram", "f": "P(w_i | w_{i-1}) = C(w_{i-1}, w_i) / C(w_{i-1})"}, {"lbl": "Sentence probability", "f": "P(w_1...w_m) ≈ product_i P(w_i | w_{i-n+1}...w_{i-1})"}], "pros": ["简单、透明、无需神经网络", "小数据也能做 baseline"], "cons": ["固定窗口", "严重稀疏", "长距离依赖完全不行"], "why": "n 太小上下文不足，n 太大又稀疏，所以需要神经语言模型用向量泛化。"}, {"name": "平滑 Smoothing", "tag": "Laplace / Add-k / Kneser-Ney / Interpolation", "what": "平滑的目的不是让模型更复杂，而是把概率质量从见过的 n-gram 分一点给没见过但可能合理的 n-gram，避免句子概率直接变成 0。", "steps": [{"t": "Laplace", "d": "所有计数 +1，简单但容易过度平滑。"}, {"t": "Add-k", "d": "加一个小于 1 的 k，比加 1 温和。"}, {"t": "Interpolation", "d": "把 unigram、bigram、trigram 按权重混合。"}, {"t": "Kneser-Ney", "d": "看一个词出现在多少种不同上下文里，而不是只看总体频率。"}], "flows": [["MLE 概率", "→", "discount seen events", "→", "redistribute mass", "→", "non-zero probability"]], "formulas": [{"lbl": "Laplace", "f": "P(w|c) = (C(c,w)+1)/(C(c)+|V|)"}, {"lbl": "Interpolation", "f": "P = λ_3 P_3 + λ_2 P_2 + λ_1 P_1,  sum λ_i = 1"}], "pros": ["解决零概率", "Kneser-Ney 在传统 LM 中很强", "思想清晰"], "cons": ["只能缓解稀疏，不能解决固定窗口", "需要调超参数"], "why": "即使平滑，n-gram 仍不能真正理解相似词，所以引出神经网络语言模型。"}, {"name": "神经语言模型", "tag": "FFNN → RNN → Transformer", "what": "神经语言模型用 embedding 和神经网络预测下一个词。相比 n-gram，它能利用词向量泛化：如果模型见过 good movie，也可能迁移到 great film。", "steps": [{"t": "FFNN LM", "d": "固定窗口里的词向量拼接，经过隐藏层预测下一词。"}, {"t": "RNN LM", "d": "用隐藏状态保存前文信息，理论上能处理任意长度序列。"}, {"t": "LSTM/GRU", "d": "用门控缓解梯度消失，更好处理长依赖。"}, {"t": "Transformer LM", "d": "用 self-attention 直接连接任意位置，训练可并行。"}], "flows": [["context tokens", "→", "embeddings", "→", "neural encoder", "→", "softmax over vocabulary"]], "formulas": [{"lbl": "Softmax LM", "f": "P(w_t | context) = softmax(W h_t + b)"}, {"lbl": "Cross entropy", "f": "L = - sum_t log P(w_t | context)"}], "pros": ["能泛化到未见组合", "可以和 embedding 一起训练", "是 GPT/BERT 的基础"], "cons": ["计算成本更高", "需要更多数据", "早期 FFNN/RNN 仍有上下文限制"], "why": "神经 LM 的架构逐步从 FFNN 演化到 RNN，再到 Transformer。"}]}, {"num": "4", "color": "#993C1D", "title": "文本分类 Text Classification", "sub": "文档或句子 → 一个类别", "methods": [{"name": "Naive Bayes", "tag": "生成式分类器", "what": "Naive Bayes 用贝叶斯公式做分类：哪个类别最可能生成这篇文档，就预测哪个类别。它假设词之间条件独立，这个假设很强但在文本分类中常常表现不错。", "steps": [{"t": "估计先验", "d": "P(c)=类别 c 的文档比例。"}, {"t": "估计似然", "d": "P(w|c)=类别 c 中词 w 出现的概率。"}, {"t": "加平滑", "d": "避免某个词没见过导致整个类别概率为 0。"}, {"t": "用 log 概率分类", "d": "把乘法变成加法，避免数值下溢。"}], "flows": [["文档 tokens", "→", "log P(c)", "+", "sum log P(w|c)", "→", "argmax c"]], "formulas": [{"lbl": "Multinomial NB", "f": "c* = argmax_c [ log P(c) + sum_{w in d} count(w,d) log P(w|c) ]"}], "pros": ["训练快", "小数据强 baseline", "可解释"], "cons": ["独立假设不真实", "不擅长处理 not good 这类组合", "特征相关会影响结果"], "why": "为了直接建模 P(label|text) 并减少独立假设，使用 Logistic Regression / SVM。"}, {"name": "Logistic Regression", "tag": "判别式线性模型", "what": "Logistic Regression 直接学习文本特征到类别概率的映射。它不需要假设词之间独立，通常比 Naive Bayes 更稳，是传统文本分类的重要方法。", "steps": [{"t": "输入特征", "d": "BOW、TF-IDF、n-gram 等。"}, {"t": "线性打分", "d": "每个类别有一组权重，计算 w_c · x + b_c。"}, {"t": "Softmax", "d": "把各类别分数转成概率。"}, {"t": "训练", "d": "最小化交叉熵，可加入 L1/L2 正则化。"}], "flows": [["TF-IDF/BOW", "→", "linear score", "→", "softmax", "→", "class probability"]], "formulas": [{"lbl": "Softmax classifier", "f": "P(c|x)= exp(w_c·x+b_c) / sum_j exp(w_j·x+b_j)"}, {"lbl": "Loss", "f": "L = -log P(y|x) + λ||w||^2"}], "pros": ["比 NB 假设少", "可输出概率", "权重可解释"], "cons": ["线性边界", "依赖手工特征", "难捕捉复杂语义组合"], "why": "线性模型表达力有限，SVM 用最大间隔提升分类边界，神经网络则自动学习特征。"}, {"name": "SVM", "tag": "最大间隔分类器", "what": "SVM 寻找一个能最大化类别间隔的超平面。对高维稀疏文本特征很有效，深度学习普及前在 NLP 分类任务中很常用。", "steps": [{"t": "构造特征", "d": "常用 BOW、TF-IDF、n-gram。"}, {"t": "最大间隔", "d": "选择能让支持向量到边界距离最大的超平面。"}, {"t": "软间隔", "d": "允许部分样本违反边界，以提高泛化。"}, {"t": "核函数", "d": "可用 kernel 处理非线性，不过文本中线性 SVM 已经很强。"}], "flows": [["文本特征", "→", "margin maximization", "→", "decision boundary", "→", "label"]], "formulas": [{"lbl": "Soft-margin SVM", "f": "min 1/2 ||w||^2 + C sum_i ξ_i\ns.t. y_i(w·x_i+b) ≥ 1-ξ_i"}], "pros": ["高维稀疏文本强", "泛化好", "线性 SVM 速度快"], "cons": ["概率输出不自然", "大规模非线性 kernel 训练慢", "多分类需要扩展"], "why": "传统分类器依赖手工特征，神经网络可以自动学习表示。"}, {"name": "神经文本分类", "tag": "FFNN/RNN/BERT classifier", "what": "神经分类器把文本编码成向量，再接一个分类层。编码器可以是词向量平均、CNN/RNN、Transformer/BERT。[CLS] 向量常用于 BERT 分类。", "steps": [{"t": "embedding", "d": "token 转成向量。"}, {"t": "encoder", "d": "FFNN 平均、RNN 最后状态、Transformer [CLS]。"}, {"t": "classification head", "d": "线性层 + softmax 输出类别概率。"}, {"t": "fine-tuning", "d": "BERT/GPT 等预训练模型可以在小数据上微调。"}], "flows": [["tokens", "→", "encoder", "→", "document vector", "→", "softmax", "→", "label"]], "formulas": [{"lbl": "BERT classification", "f": "P(y|x) = softmax(W h_[CLS] + b)"}], "pros": ["自动学习特征", "能捕捉复杂语义", "预训练模型效果强"], "cons": ["需要更多计算", "解释性弱", "小数据从头训练易过拟合"], "why": "分类只输出一个标签；POS/NER 等任务需要对每个 token 输出标签，因此进入序列标注。"}]}, {"num": "5", "color": "#993556", "title": "序列标注 Sequence Labelling", "sub": "每个 token → 一个标签：POS / NER / Chunking", "methods": [{"name": "POS 与 BIO 标注", "tag": "标签体系", "what": "POS 标注给每个词标词性，例如 NN、VB、JJ。NER 识别人名、地点、组织等实体，常用 BIO 格式表示实体边界：B 表示开始，I 表示内部，O 表示非实体。", "steps": [{"t": "确定标签集", "d": "POS 用 Penn Treebank 等标签；NER 用 PER/LOC/ORG/MISC 等。"}, {"t": "BIO 编码", "d": "New/B-LOC York/I-LOC is/O great/O。"}, {"t": "逐 token 预测", "d": "每个位置输出一个标签。"}, {"t": "检查合法性", "d": "I-PER 前面不应无缘无故接 O 或 B-LOC。"}], "flows": [["tokens", "→", "tag set", "→", "one label per token", "→", "tag sequence"]], "formulas": [{"lbl": "序列标注形式", "f": "x = (w1,...,wn),  y = (t1,...,tn)"}], "pros": ["能处理局部结构信息", "NER/信息抽取基础"], "cons": ["标签之间有依赖", "逐点独立预测可能产生非法序列"], "why": "为了利用标签之间的转移规律，引出 HMM 和 Viterbi。"}, {"name": "HMM + Viterbi", "tag": "生成式序列模型", "what": "HMM 认为标签是隐藏状态，词是观测。模型学习标签转移概率 P(t_i|t_{i-1}) 和发射概率 P(w_i|t_i)。Viterbi 用动态规划找全局最可能的标签序列。", "steps": [{"t": "训练转移概率", "d": "统计一个标签后面接另一个标签的频率。"}, {"t": "训练发射概率", "d": "统计某标签生成某词的频率。"}, {"t": "Viterbi 初始化", "d": "从句首标签开始填动态规划表。"}, {"t": "递推与回溯", "d": "每一步保留到达当前标签的最高概率和最佳前驱。"}], "flows": [["tokens", "→", "emission × transition", "→", "Viterbi DP", "→", "best tag path"]], "formulas": [{"lbl": "HMM objective", "f": "y* = argmax_y product_i P(w_i|t_i) P(t_i|t_{i-1})"}, {"lbl": "Viterbi", "f": "α_i(t)= max_{t'} α_{i-1}(t') P(t|t') P(w_i|t)"}], "pros": ["全局解码", "能建模标签转移", "可解释"], "cons": ["生成式假设强", "难加入复杂特征", "只看有限上下文"], "why": "为了加入任意上下文特征并直接建模 P(tags|words)，引出 CRF。"}, {"name": "CRF", "tag": "判别式序列模型", "what": "CRF 直接建模 P(标签序列|词序列)，可以加入丰富特征，如当前词、前后词、后缀、大小写、标签转移等。它是传统序列标注中的强方法。", "steps": [{"t": "设计特征函数", "d": "例如 当前词首字母大写且标签为 B-PER。"}, {"t": "序列打分", "d": "把所有位置的特征权重加总。"}, {"t": "归一化", "d": "用 partition function 对所有可能标签序列归一化。"}, {"t": "解码", "d": "用 Viterbi 找得分最高的标签序列。"}], "flows": [["tokens", "→", "feature functions", "→", "sequence score", "→", "normalization", "→", "Viterbi"]], "formulas": [{"lbl": "Linear-chain CRF", "f": "P(y|x)= exp(sum_i sum_k λ_k f_k(y_{i-1},y_i,x,i)) / Z(x)"}], "pros": ["能用任意特征", "建模标签依赖", "比 HMM 灵活"], "cons": ["特征工程繁琐", "训练更慢", "不能自动学习深层语义"], "why": "为了减少手工特征，使用 BiLSTM/Transformer 自动学习上下文表示，再接 CRF 或 softmax。"}, {"name": "BiLSTM/Transformer 序列标注", "tag": "深度序列标注", "what": "用 BiLSTM 或 Transformer 为每个 token 生成上下文化向量，然后逐 token 分类。NER 中常在顶部接 CRF，保证标签序列合法。BERT 微调是现代常用做法。", "steps": [{"t": "embedding", "d": "token 转向量，可以是静态词向量或 BERT 子词向量。"}, {"t": "上下文编码", "d": "BiLSTM 看左右上下文；BERT 用 self-attention 看全句。"}, {"t": "token classification", "d": "每个位置接 softmax 输出标签概率。"}, {"t": "可选 CRF", "d": "加入标签转移矩阵，Viterbi 找全局最优标签序列。"}], "flows": [["tokens", "→", "BERT/BiLSTM", "→", "h_i", "→", "softmax/CRF", "→", "tags"]], "formulas": [{"lbl": "Token classification", "f": "P(t_i|x)=softmax(W h_i + b)"}], "pros": ["自动学习特征", "上下文感知", "BERT 微调效果强"], "cons": ["训练成本高", "需要标注序列数据", "子词与标签对齐要小心"], "why": "序列标注体现了深度模型优势，接下来需要理解 FFNN、RNN、Transformer 这些架构本身。"}]}, {"num": "6", "color": "#7C3AED", "title": "深度学习架构 Neural Architectures", "sub": "FFNN → RNN/LSTM → Attention → Transformer", "methods": [{"name": "FFNN", "tag": "前馈神经网络", "what": "FFNN 是最基础的神经网络：输入经过线性层、非线性激活，再输出预测。它适合固定长度输入，但不能自然处理变长序列。", "steps": [{"t": "输入向量", "d": "例如 TF-IDF、词向量平均、固定窗口词向量拼接。"}, {"t": "线性变换", "d": "z = Wx+b。"}, {"t": "非线性", "d": "ReLU、tanh、sigmoid 增强表达能力。"}, {"t": "输出层", "d": "分类用 softmax，回归用线性输出。"}], "flows": [["x", "→", "linear", "→", "activation", "→", "linear", "→", "softmax"]], "formulas": [{"lbl": "FFNN", "f": "h = ReLU(W_1 x + b_1)\ny = softmax(W_2 h + b_2)"}], "pros": ["简单", "训练快", "是很多模型的组件"], "cons": ["固定输入长度", "不擅长序列顺序", "长文本信息损失"], "why": "NLP 是序列数据，需要能逐步读入词并保存历史的 RNN。"}, {"name": "RNN / LSTM / GRU", "tag": "循环神经网络", "what": "RNN 用隐藏状态 h_t 保存到当前位置为止的历史信息。普通 RNN 容易梯度消失，LSTM 和 GRU 用门控机制控制记忆的保留和更新。", "steps": [{"t": "逐词输入", "d": "每个时间步输入一个 token embedding。"}, {"t": "更新隐藏状态", "d": "h_t 同时依赖当前输入 x_t 和前一状态 h_{t-1}。"}, {"t": "LSTM 门控", "d": "遗忘门决定旧记忆留多少，输入门决定新信息写多少，输出门决定暴露多少。"}, {"t": "BPTT", "d": "把时间展开后反向传播训练共享参数。"}], "flows": [["x1", "→", "h1", "→", "x2", "→", "h2", "→", "...", "→", "hT"]], "formulas": [{"lbl": "Simple RNN", "f": "h_t = tanh(W_h h_{t-1} + W_x x_t + b)"}, {"lbl": "LSTM memory", "f": "C_t = f_t * C_{t-1} + i_t * C~_t\nh_t = o_t * tanh(C_t)"}], "pros": ["能处理变长序列", "参数共享", "LSTM 缓解长期依赖问题"], "cons": ["顺序计算，难并行", "长距离依赖仍可能弱", "训练慢"], "why": "RNN 顺序计算太慢，注意力机制允许模型直接关注任意位置。"}, {"name": "Attention", "tag": "Query-Key-Value", "what": "Attention 的核心是：当前词不必只依赖前一个状态，而是可以直接看输入序列中最相关的位置。Query 表示我想找什么，Key 表示每个位置有什么，Value 表示真正取回的信息。", "steps": [{"t": "生成 Q/K/V", "d": "输入向量分别乘 W_Q、W_K、W_V。"}, {"t": "计算相关性", "d": "QK^T 计算 query 和每个 key 的相似度。"}, {"t": "缩放与 softmax", "d": "除以 sqrt(d_k) 后 softmax 得到注意力权重。"}, {"t": "加权求和", "d": "用注意力权重对 V 加权求和。"}], "flows": [["X", "→", "Q,K,V", "→", "QK^T/sqrt(d)", "→", "softmax", "→", "weighted V"]], "formulas": [{"lbl": "Scaled dot-product attention", "f": "Attention(Q,K,V)=softmax(QK^T / sqrt(d_k))V"}], "pros": ["直接建模长距离依赖", "权重有一定可解释性", "Transformer 核心"], "cons": ["self-attention 是 O(n^2)", "本身不包含位置信息"], "why": "把 self-attention、multi-head、position encoding、FFN、残差连接组合起来就是 Transformer。"}, {"name": "Transformer", "tag": "Multi-head self-attention", "what": "Transformer 用 self-attention 取代 RNN 的顺序递归，因此能并行训练，并且让任意两个位置直接交互。现代 BERT、GPT、T5 都建立在 Transformer 上。", "steps": [{"t": "Embedding + Position", "d": "token embedding 加 position encoding，因为 attention 本身不知道顺序。"}, {"t": "Multi-head attention", "d": "多个注意力头并行学习不同关系。"}, {"t": "Residual + LayerNorm", "d": "残差帮助梯度传播，LayerNorm 稳定训练。"}, {"t": "Feed-forward network", "d": "每个位置独立经过两层 MLP。"}], "flows": [["tokens", "→", "embedding+position", "→", "multi-head attention", "→", "add&norm", "→", "FFN", "→", "add&norm"]], "formulas": [{"lbl": "Multi-head", "f": "MHA(Q,K,V)=Concat(head_1,...,head_h)W^O"}, {"lbl": "Transformer block", "f": "H = LayerNorm(X + MHA(X))\nO = LayerNorm(H + FFN(H))"}], "pros": ["并行训练", "长距离依赖强", "可扩展到大模型"], "cons": ["长序列 O(n^2) 成本高", "需要大量数据和算力", "位置编码是额外设计"], "why": "Transformer 强大但从头训练昂贵，于是出现预训练 + 微调的迁移学习范式。"}]}, {"num": "7", "color": "#185FA5", "title": "预训练与迁移学习 Pretraining", "sub": "先在大规模无标注语料学习，再迁移到下游任务", "methods": [{"name": "ELMo", "tag": "contextual embeddings before BERT", "what": "ELMo 用双向语言模型产生上下文化词向量，同一个词在不同句子中会有不同向量。它解决了 Word2Vec/GloVe 一词一向量的问题。", "steps": [{"t": "训练语言模型", "d": "前向 LM 预测下一个词，后向 LM 预测前一个词。"}, {"t": "得到每层表示", "d": "不同层捕捉不同层次信息。"}, {"t": "组合表示", "d": "下游任务学习如何加权组合各层。"}, {"t": "作为特征", "d": "把 ELMo 向量输入到分类/标注模型。"}], "flows": [["sentence", "→", "biLM", "→", "contextual word vectors", "→", "downstream model"]], "formulas": [{"lbl": "ELMo representation", "f": "ELMo_k = γ sum_j s_j h_{k,j}"}], "pros": ["上下文化", "改善静态词向量多义问题", "可作为通用特征"], "cons": ["RNN 训练慢", "不是端到端 Transformer 预训练范式"], "why": "BERT 用 Transformer Encoder 做更强的双向预训练。"}, {"name": "BERT", "tag": "Encoder-only + MLM", "what": "BERT 是双向 Transformer Encoder，通过 Masked Language Modelling 学习上下文表示。它特别适合理解类任务，如分类、NER、QA。", "steps": [{"t": "输入格式", "d": "[CLS] sentence A [SEP] sentence B [SEP]。"}, {"t": "MLM", "d": "随机 mask 部分 token，让模型根据左右上下文预测原词。"}, {"t": "NSP", "d": "早期 BERT 还训练判断句子 B 是否接在 A 后面。"}, {"t": "Fine-tuning", "d": "分类用 [CLS]，序列标注用每个 token 的向量。"}], "flows": [["text", "→", "mask tokens", "→", "Transformer Encoder", "→", "MLM pretrain", "→", "fine-tune"]], "formulas": [{"lbl": "MLM", "f": "L_MLM = - sum_{i in masked} log P(w_i | x_{\not i})"}, {"lbl": "Classification", "f": "P(y|x)=softmax(W h_[CLS])"}], "pros": ["真正双向上下文", "理解任务很强", "少量标注数据即可微调"], "cons": ["不自然适合长文本生成", "预训练和微调有 mask mismatch", "模型较大"], "why": "BERT 擅长理解，GPT 则通过因果语言建模擅长生成。"}, {"name": "GPT", "tag": "Decoder-only + CLM", "what": "GPT 是 decoder-only Transformer，用前文预测下一个词。它天然适合文本生成，随着参数和数据规模增大，出现 zero-shot、few-shot、in-context learning 能力。", "steps": [{"t": "Causal mask", "d": "每个位置只能看左边，不能偷看未来 token。"}, {"t": "CLM 训练", "d": "对每个位置预测下一个 token。"}, {"t": "Prompting", "d": "用自然语言指令或示例把任务写进上下文。"}, {"t": "Generation", "d": "逐 token 采样或解码，生成完整回答。"}], "flows": [["prompt", "→", "decoder-only Transformer", "→", "next-token distribution", "→", "generated text"]], "formulas": [{"lbl": "Causal LM", "f": "L_CLM = - sum_t log P(w_t | w_1,...,w_{t-1})"}], "pros": ["生成能力强", "prompt 可以统一多任务", "few-shot 能力好"], "cons": ["可能 hallucination", "不一定遵循人类偏好", "知识可能过时"], "why": "GPT 能生成，但需要更好的任务格式和指令控制，于是引出 prompting、instruction tuning 和 RLHF。"}, {"name": "T5 / Encoder-Decoder", "tag": "text-to-text framework", "what": "T5 把所有 NLP 任务统一成 text-to-text：输入是文本，输出也是文本。翻译、摘要、分类、问答都可以写成文本生成问题。", "steps": [{"t": "任务前缀", "d": "例如 translate English to German: ... 或 summarize: ...。"}, {"t": "Encoder", "d": "编码输入文本。"}, {"t": "Decoder", "d": "自回归生成输出文本。"}, {"t": "多任务迁移", "d": "不同任务共享同一个 text-to-text 框架。"}], "flows": [["task prefix + input text", "→", "encoder", "→", "decoder", "→", "output text"]], "formulas": [{"lbl": "Seq2seq", "f": "P(y|x)= product_t P(y_t | y_{<t}, x)"}], "pros": ["统一任务格式", "适合翻译/摘要/问答", "迁移学习灵活"], "cons": ["生成解码成本高", "分类任务可能不如专门 head 直接"], "why": "当模型足够大时，很多任务甚至可以不微调，而用 prompt 直接解决。"}]}, {"num": "8", "color": "#0E7490", "title": "Prompting 与 LLM 使用", "sub": "Zero-shot / One-shot / Few-shot / CoT / Decoding", "methods": [{"name": "Zero-shot / One-shot / Few-shot", "tag": "in-context learning", "what": "Zero-shot 不给例子，只给任务说明；One-shot 给一个例子；Few-shot 给几个例子。模型参数不更新，只是在上下文中临时学习任务格式。", "steps": [{"t": "Zero-shot", "d": "直接写任务：Classify sentiment: ...。"}, {"t": "One-shot", "d": "给一个输入输出示例，再给新输入。"}, {"t": "Few-shot", "d": "给多个示例，让模型模仿标签空间和输出格式。"}, {"t": "格式控制", "d": "要求模型输出 JSON、表格、标签之一，可减少跑题。"}], "flows": [["instruction", "→", "optional examples", "→", "new input", "→", "LLM output"]], "formulas": [{"lbl": "In-context prediction", "f": "ŷ = LM(instruction, examples, x)"}], "pros": ["无需训练", "快速适配新任务", "适合低资源场景"], "cons": ["对 prompt 敏感", "上下文长度有限", "结果不稳定"], "why": "普通 prompt 不一定让模型推理清楚，所以引出 Chain-of-Thought 等推理提示。"}, {"name": "Chain-of-Thought", "tag": "让模型分步推理", "what": "Chain-of-Thought 通过提示模型分步骤思考，提升数学、逻辑、多跳问答等需要中间推理的任务表现。考试中你可以理解为：把隐含推理过程显式拆开。", "steps": [{"t": "显式要求步骤", "d": "例如 think step by step 或要求先分析再答案。"}, {"t": "提供示例推理", "d": "Few-shot CoT 给出样例的推理链。"}, {"t": "Self-consistency", "d": "采样多条推理路径，再投票选答案。"}, {"t": "控制输出", "d": "最终只保留答案或结构化结果，避免推理过长。"}], "flows": [["problem", "→", "reasoning prompt", "→", "intermediate steps", "→", "final answer"]], "formulas": [{"lbl": "Self-consistency", "f": "answer = majority_vote({LM_sample_i(prompt)})"}], "pros": ["复杂推理任务明显改善", "便于检查中间过程", "与 few-shot 可结合"], "cons": ["可能编造看似合理的推理", "成本更高", "不保证事实正确"], "why": "Prompt 能改善输出，但模型仍可能偏离人类偏好，需要 instruction tuning 和 alignment。"}, {"name": "解码 Decoding", "tag": "greedy / beam / sampling", "what": "语言模型每一步输出的是词表概率分布，解码决定如何从概率分布中选下一个 token。不同策略会影响答案是否保守、多样或重复。", "steps": [{"t": "Greedy", "d": "每一步选概率最高 token，简单但可能陷入局部最优。"}, {"t": "Beam search", "d": "同时保留 k 条候选序列，常用于翻译。"}, {"t": "Top-k / Top-p", "d": "从高概率候选中采样，增加多样性。"}, {"t": "Temperature", "d": "温度高更随机，温度低更确定。"}], "flows": [["probability distribution", "→", "decoding strategy", "→", "next token", "→", "repeat"]], "formulas": [{"lbl": "Temperature", "f": "P_i = exp(z_i/T) / sum_j exp(z_j/T)"}], "pros": ["可控制稳定性与创造性", "不同任务可选不同策略"], "cons": ["高随机可能胡说", "beam search 可能生成重复/平淡文本"], "why": "即使用好解码，LLM 仍可能不安全、不诚实、不符合人类偏好，因此进入 alignment。"}]}, {"num": "9", "color": "#BE185D", "title": "Alignment 与 RLHF", "sub": "让模型更有用、诚实、安全", "methods": [{"name": "Instruction Tuning", "tag": "监督微调 SFT", "what": "Instruction tuning 用大量“指令-理想回答”数据继续训练模型，让模型学会听懂任务指令，而不是只会预测下一个词。SFT 是 RLHF 之前的关键步骤。", "steps": [{"t": "收集指令数据", "d": "包含问题、任务说明、理想回答。"}, {"t": "监督训练", "d": "用标准交叉熵训练模型生成理想回答。"}, {"t": "提升泛化", "d": "多任务、多格式指令让模型更会遵循新指令。"}, {"t": "作为 RLHF 起点", "d": "SFT 模型通常再进入奖励模型和 PPO。"}], "flows": [["base LM", "→", "instruction-response data", "→", "SFT", "→", "instruction-following model"]], "formulas": [{"lbl": "SFT loss", "f": "L_SFT = - sum_t log P(y_t | x, y_<t)"}], "pros": ["明显提升指令遵循", "训练相对直接", "是 RLHF 基础"], "cons": ["取决于标注质量", "不直接优化人类偏好排序", "可能学到模板化回答"], "why": "SFT 告诉模型怎么回答，但还不能很好地区分“更好”和“更差”的回答，因此需要偏好学习。"}, {"name": "Reward Model", "tag": "人类偏好建模", "what": "奖励模型通过人类对两个回答的偏好排序学习：给同一个 prompt 的两个回答 A/B，人类选择更好的，奖励模型学习给更好回答更高分。", "steps": [{"t": "生成候选回答", "d": "用 SFT 模型对同一 prompt 生成多个回答。"}, {"t": "人类排序", "d": "标注者选择 A 比 B 好，或对多个回答排序。"}, {"t": "训练奖励模型", "d": "输入 prompt+answer，输出一个标量 reward。"}, {"t": "用于强化学习", "d": "后续 PPO 优化模型生成更高 reward 的回答。"}], "flows": [["prompt", "→", "answers A/B", "→", "human preference", "→", "reward model"]], "formulas": [{"lbl": "Preference loss", "f": "L = - log σ(r(x,y_w) - r(x,y_l))"}], "pros": ["把主观偏好转成可优化信号", "比硬写规则灵活"], "cons": ["标注成本高", "奖励模型也会有偏差", "可能被模型钻空子"], "why": "有了 reward 后，可以用强化学习直接优化模型策略，典型方法是 PPO。"}, {"name": "RLHF / PPO", "tag": "Reinforcement Learning from Human Feedback", "what": "RLHF 用奖励模型作为目标，继续训练语言模型，让它生成更符合人类偏好的回答。PPO 是常用优化方法，同时会加入 KL 惩罚，防止模型偏离原模型太远。", "steps": [{"t": "SFT 初始化", "d": "先得到会遵循指令的模型。"}, {"t": "奖励打分", "d": "模型生成回答，reward model 给分。"}, {"t": "PPO 更新", "d": "增加高 reward 回答概率，同时限制更新幅度。"}, {"t": "KL penalty", "d": "防止模型为了 reward 变得奇怪或语言质量下降。"}], "flows": [["SFT model", "→", "generate", "→", "reward model", "→", "PPO update", "→", "aligned model"]], "formulas": [{"lbl": "RLHF objective", "f": "maximize E[r(x,y)] - β KL(π_RL(y|x) || π_SFT(y|x))"}], "pros": ["提升 helpfulness / harmlessness", "更符合人类偏好", "ChatGPT 类模型关键技术"], "cons": ["复杂且昂贵", "可能 reward hacking", "偏好数据会引入价值偏差"], "why": "对齐改善行为，但不能解决知识过时和幻觉，所以实际系统常结合 RAG。"}]}, {"num": "10", "color": "#0369A1", "title": "检索与 RAG", "sub": "让模型先查资料，再回答", "methods": [{"name": "信息检索 IR", "tag": "BM25 / dense retrieval / reranking", "what": "检索任务是给定 query，从文档库中找相关文档。传统方法如 BM25 使用词匹配，dense retrieval 使用向量相似度，reranker 再精排候选结果。", "steps": [{"t": "文档切分", "d": "把长文档切成 chunk，并建立索引。"}, {"t": "第一阶段召回", "d": "BM25 或 embedding 检索快速找 top-k。"}, {"t": "重排序", "d": "cross-encoder/reranker 对候选文档精排。"}, {"t": "评估", "d": "Recall@k 看是否把相关文档召回，MRR/MAP 看排序质量。"}], "flows": [["query", "→", "retriever", "→", "top-k documents", "→", "reranker", "→", "ranked evidence"]], "formulas": [{"lbl": "Cosine similarity", "f": "sim(q,d)= (q · d) / (||q|| ||d||)"}, {"lbl": "MRR", "f": "MRR = 1/|Q| sum_q 1/rank_q"}], "pros": ["可引用外部证据", "知识更新容易", "适合大文档库"], "cons": ["召回失败则后面无法回答", "chunk 切分影响大", "关键词和语义检索各有盲点"], "why": "检索出的证据可以交给 LLM 生成答案，这就是 RAG。"}, {"name": "RAG", "tag": "Retrieval-Augmented Generation", "what": "RAG 先用检索器找相关材料，再把材料塞进 prompt，让 LLM 基于证据回答。它能缓解幻觉、知识过时、私有知识无法进入模型参数的问题。", "steps": [{"t": "Index", "d": "把文档 chunk 化，计算 embedding，建立向量库或倒排索引。"}, {"t": "Retrieve", "d": "用户问题进入检索器，找 top-k 相关 chunk。"}, {"t": "Augment", "d": "把检索到的证据和问题一起放进 prompt。"}, {"t": "Generate", "d": "LLM 根据证据生成答案，并可附引用。"}], "flows": [["question", "→", "retrieve evidence", "→", "prompt with context", "→", "LLM", "→", "grounded answer"]], "formulas": [{"lbl": "RAG decomposition", "f": "P(y|x) ≈ sum_z P(y|x,z) P(z|x)"}], "pros": ["减少 hallucination", "能用最新/私有知识", "答案可追溯"], "cons": ["依赖检索质量", "上下文窗口限制", "证据冲突时仍会错"], "why": "RAG 把语言模型和外部知识结合；如果输入不止文字，还要扩展到多模态。"}]}, {"num": "11", "color": "#9333EA", "title": "多模态 Multimodal NLP", "sub": "图像、文本、语音等联合建模", "methods": [{"name": "Vision-Language Models", "tag": "CLIP / image-text alignment", "what": "视觉-语言模型把图片和文本映射到同一个语义空间，使匹配的图文向量接近、不匹配的远离。CLIP 是典型代表，可用于图文检索和 zero-shot 图像分类。", "steps": [{"t": "图像编码器", "d": "把 image 编码成向量。"}, {"t": "文本编码器", "d": "把 caption/prompt 编码成向量。"}, {"t": "对比学习", "d": "匹配图文拉近，不匹配图文推远。"}, {"t": "zero-shot 分类", "d": "把类别写成文本 prompt，与图片向量比相似度。"}], "flows": [["image", "→", "image encoder", "↘", "shared space", "↗", "text encoder", "←", "caption"]], "formulas": [{"lbl": "Contrastive similarity", "f": "sim(image, text)= cosine(f_img(image), f_txt(text))"}], "pros": ["连接视觉和语言", "zero-shot 能力强", "适合图文检索"], "cons": ["需要海量图文对", "可能学到数据偏见", "细粒度推理仍难"], "why": "图文对齐后，可以进一步让模型根据图像进行问答和生成。"}, {"name": "Image Captioning / VQA", "tag": "看图说话 / 视觉问答", "what": "Image Captioning 是给图片生成描述；VQA 是给图片和问题生成答案。它们通常把视觉特征接入语言模型或 encoder-decoder 结构。", "steps": [{"t": "提取视觉特征", "d": "CNN/ViT 把图片变成 patch/token 表示。"}, {"t": "融合文本", "d": "问题或提示文本与视觉 token 一起输入模型。"}, {"t": "生成答案", "d": "decoder 自回归生成 caption 或 answer。"}, {"t": "评价", "d": "caption 可用 BLEU/CIDEr 等，VQA 看答案准确率和人工判断。"}], "flows": [["image + question", "→", "visual encoder", "→", "language decoder", "→", "answer/caption"]], "formulas": [{"lbl": "Conditional generation", "f": "P(y|image, question)= product_t P(y_t | y_<t, image, question)"}], "pros": ["扩展 NLP 到真实多模态场景", "适合辅助理解图片/文档"], "cons": ["可能视觉幻觉", "评价困难", "多模态偏见更复杂"], "why": "模型能力越强，伦理、安全、公平性和事实性问题越重要。"}]}, {"num": "12", "color": "#DC2626", "title": "伦理、安全与可靠性", "sub": "Bias / Hallucination / Privacy / Transparency", "methods": [{"name": "偏见 Bias 与公平性", "tag": "data bias / model bias", "what": "NLP 模型从数据中学习语言模式，也会学习社会偏见、刻板印象和不公平关联。偏见可能来自训练数据、标注过程、任务定义和部署环境。", "steps": [{"t": "识别数据偏见", "d": "检查不同群体、语言、方言、主题是否分布不均。"}, {"t": "评估模型行为", "d": "比较不同群体上的错误率、毒性、拒答率。"}, {"t": "缓解", "d": "数据平衡、偏见测试、后处理、人工审核、透明说明。"}, {"t": "持续监控", "d": "部署后语言环境变化，需要持续评估。"}], "flows": [["training data", "→", "model", "→", "outputs", "→", "bias audit", "→", "mitigation"]], "formulas": [{"lbl": "公平性检查示意", "f": "gap = |metric(group A) - metric(group B)|"}], "pros": ["提升社会可接受性", "降低伤害", "考试和报告中很关键"], "cons": ["公平性定义可能冲突", "偏见很难完全消除"], "why": "除了偏见，LLM 还会产生看似自信但不真实的 hallucination。"}, {"name": "Hallucination 与事实性", "tag": "生成模型风险", "what": "Hallucination 指模型生成没有事实依据或与证据冲突的内容。它来自语言模型本质：模型优化的是下一个 token 概率，不是事实数据库查询。", "steps": [{"t": "识别风险场景", "d": "法律、医疗、金融、学术引用、最新信息等高风险。"}, {"t": "降低风险", "d": "使用 RAG、引用证据、限制模型只基于材料回答。"}, {"t": "校验", "d": "人工复核、自动事实核查、来源交叉验证。"}, {"t": "透明表达不确定性", "d": "不知道时应该说明，而不是编造。"}], "flows": [["LLM generation", "→", "possible hallucination", "→", "evidence grounding", "→", "verification"]], "formulas": [{"lbl": "核心区别", "f": "high P(text) ≠ true(text)"}], "pros": ["理解限制后使用更安全", "RAG 和引用能显著改善可靠性"], "cons": ["无法完全消除", "检索材料错误也会污染答案"], "why": "事实性之外，还要考虑隐私、版权、透明度和人类监督。"}, {"name": "隐私、透明度与人类监督", "tag": "responsible NLP", "what": "NLP 系统可能处理个人数据、敏感文本和版权材料，因此需要隐私保护、透明说明、适当的人类监督和问责机制。尤其在高风险应用中，模型不应成为完全自动的最终决策者。", "steps": [{"t": "隐私", "d": "最小化收集、去标识化、访问控制、避免泄露训练数据。"}, {"t": "透明度", "d": "说明系统能力、限制、数据来源和不确定性。"}, {"t": "人类监督", "d": "高风险决策保留人工复核和申诉通道。"}, {"t": "问责", "d": "记录模型版本、输入输出、错误处理流程。"}], "flows": [["NLP system", "→", "privacy check", "→", "transparency", "→", "human oversight", "→", "accountability"]], "formulas": [{"lbl": "责任原则", "f": "automation + accountability + oversight > automation alone"}], "pros": ["降低实际部署风险", "符合法律/伦理要求", "提升用户信任"], "cons": ["增加成本", "人类监督也可能有偏见", "透明度和商业机密可能冲突"], "why": "到这里，整门课从文本处理、建模、预训练、LLM 到安全部署形成闭环。"}]}];
const R = document.getElementById('R');
function e(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function render(){
  R.innerHTML = D.map((s,si)=>`<section class="stage" id="stage-${si}" data-text="${e((s.title+' '+s.sub+' '+s.num+' '+s.methods.map(m=>m.name+' '+m.tag+' '+m.what).join(' ')).toLowerCase())}">
    <div class="sh" onclick="toggleStage(${si})"><span class="sn" style="background:${s.color}">${e(s.num)}</span><span class="st">${e(s.title)}</span><span class="ss">${e(s.sub)}</span><span class="ch open" id="ch-${si}">▶</span></div>
    <div class="mr" id="mr-${si}">${s.methods.map((m,mi)=>`<div class="mc" id="card-${si}-${mi}" data-text="${e((m.name+' '+m.tag+' '+m.what+' '+m.steps.map(x=>x.t+' '+x.d).join(' ')+' '+m.formulas.map(f=>f.lbl+' '+f.f).join(' ')).toLowerCase())}" onclick="showMethod(${si},${mi},event)"><span class="dot"></span><div class="mn">${e(m.name)}</div><div class="mt">${e(m.tag)}</div></div>`).join('')}</div>
    <div class="det" id="det-${si}"></div>
  </section>`).join('<div class="cn"><div class="cl"></div><div class="ca">↓</div></div>');
  D.forEach((_,si)=>showMethod(si,0));
  updateCount();
}
function toggleStage(si){
  const mr=document.getElementById(`mr-${si}`), det=document.getElementById(`det-${si}`), ch=document.getElementById(`ch-${si}`);
  const hide=mr.style.display!== 'none';
  mr.style.display=hide?'none':'flex'; det.style.display=hide?'none':''; ch.classList.toggle('open',!hide);
}
function showMethod(si,mi,ev){
  if(ev) ev.stopPropagation();
  const s=D[si], m=s.methods[mi], det=document.getElementById(`det-${si}`);
  document.querySelectorAll(`#mr-${si} .mc`).forEach(c=>c.classList.remove('active'));
  const card=document.getElementById(`card-${si}-${mi}`); if(card) card.classList.add('active');
  const flows=(m.flows||[]).map(flow=>`<div class="flow">${flow.map(x=>x==='→'||x==='↘'||x==='↗'||x==='×'||x==='+'||x==='OR'||x==='or'||x==='或'?`<span class="fa">${e(x)}</span>`:`<span class="fb">${e(x)}</span>`).join('')}</div>`).join('');
  const steps=(m.steps||[]).map((x,i)=>`<li class="li"><span class="ln">${i+1}</span><div class="lt"><b>${e(x.t)}：</b>${e(x.d)} </div></li>`).join('');
  const fms=(m.formulas||[]).map(f=>`<div class="fl">${e(f.lbl)}</div><pre class="fm">${e(f.f)}</pre>`).join('');
  const next = mi < s.methods.length-1 ? `下一个方法：${s.methods[mi+1].name}` : (si < D.length-1 ? `进入下一阶段：${D[si+1].title}` : '课程闭环：从技术能力回到可靠部署');
  det.innerHTML=`<div class="tabs">
    <div class="tab on" onclick="tab(this,'tw-${si}-${mi}')">简介</div><div class="tab" onclick="tab(this,'ts-${si}-${mi}')">步骤与公式</div><div class="tab" onclick="tab(this,'tp-${si}-${mi}')">优缺点</div><div class="tab" onclick="tab(this,'ty-${si}-${mi}')">引出路径</div></div>
    <div class="tb on" id="tw-${si}-${mi}"><p class="wt">${e(m.what)}</p></div>
    <div class="tb" id="ts-${si}-${mi}">${flows}<ul class="sl">${steps}</ul>${fms}</div>
    <div class="tb" id="tp-${si}-${mi}"><div class="pc"><div class="pp pro"><div class="pl">优点 Pros</div>${(m.pros||[]).map(p=>`<div class="pi">${e(p)}</div>`).join('')}</div><div class="pp con"><div class="pl">缺点 Cons</div>${(m.cons||[]).map(c=>`<div class="pi">${e(c)}</div>`).join('')}</div></div></div>
    <div class="tb" id="ty-${si}-${mi}"><div class="wy"><div class="wl">${e(next)}</div><div class="wx">${e(m.why)}</div></div></div>`;
  det.classList.add('open');
}
function tab(el,id){const det=el.closest('.det');det.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));det.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));el.classList.add('on');document.getElementById(id).classList.add('on');}
function expandAll(){D.forEach((_,si)=>{document.getElementById(`mr-${si}`).style.display='flex';document.getElementById(`det-${si}`).style.display='';document.getElementById(`ch-${si}`).classList.add('open');})}
function collapseAll(){D.forEach((_,si)=>{document.getElementById(`mr-${si}`).style.display='none';document.getElementById(`det-${si}`).style.display='none';document.getElementById(`ch-${si}`).classList.remove('open');})}
function filterCards(){
  const q=document.getElementById('q').value.trim().toLowerCase(); let shown=0;
  D.forEach((s,si)=>{let stageMatch=!q || document.getElementById(`stage-${si}`).dataset.text.includes(q); let any=false;
    s.methods.forEach((m,mi)=>{const c=document.getElementById(`card-${si}-${mi}`); const ok=!q || stageMatch || c.dataset.text.includes(q); c.classList.toggle('hidden',!ok); if(ok){shown++; any=true;} });
    document.getElementById(`stage-${si}`).classList.toggle('hidden',!any);
    if(q && any){document.getElementById(`mr-${si}`).style.display='flex';document.getElementById(`det-${si}`).style.display='';document.getElementById(`ch-${si}`).classList.add('open');}
  }); updateCount(shown);
}
function updateCount(n){const total=D.reduce((a,s)=>a+s.methods.length,0);document.getElementById('cnt').textContent=(n===undefined?total:n)+' / '+total+' 个方法';}
render();
</script>
