const root=document.getElementById('root');
let openMethod=null;

D.forEach((stage,si)=>{
  const wrap=document.createElement('div');
  const hdr=document.createElement('div');
  hdr.className='stage-hdr';
  hdr.innerHTML=`<span class="stage-num" style="background:${stage.color}">${stage.num}</span><span class="stage-title">${stage.title}</span><span class="stage-sub">${stage.sub}</span><span class="chev" id="chev-${si}">▶</span>`;
  hdr.onclick=()=>toggleStage(si);
  wrap.appendChild(hdr);

  const body=document.createElement('div');
  body.id=`sb-${si}`;body.style.display='none';
  const row=document.createElement('div');row.className='method-row';

  stage.methods.forEach((m,mi)=>{
    const card=document.createElement('div');
    card.className='mcard';card.id=`mc-${si}-${mi}`;
    card.innerHTML=`<div class="adot"></div><div class="mn">${m.name}</div><div class="mt">${m.tag}</div>`;
    card.onclick=()=>toggleMethod(si,mi);
    row.appendChild(card);
  });
  body.appendChild(row);

  const det=document.createElement('div');
  det.className='detail';det.id=`det-${si}`;
  body.appendChild(det);
  wrap.appendChild(body);

  if(si<D.length-1){
    const c=document.createElement('div');c.className='conn';
    c.innerHTML='<div class="cline"></div><div class="carr">↓</div>';
    wrap.appendChild(c);
  }
  root.appendChild(wrap);
});

function toggleStage(si){
  const b=document.getElementById(`sb-${si}`);
  const c=document.getElementById(`chev-${si}`);
  const open=b.style.display!=='none';
  b.style.display=open?'none':'block';
  c.classList.toggle('open',!open);
}

function toggleMethod(si,mi){
  const det=document.getElementById(`det-${si}`);
  const card=document.getElementById(`mc-${si}-${mi}`);
  const m=D[si].methods[mi];
  const isLastStage=si===D.length-1;
  const isLastMethod=mi===D[si].methods.length-1;

  if(openMethod===`${si}-${mi}`&&det.classList.contains('open')){
    det.classList.remove('open');card.classList.remove('active');openMethod=null;return;
  }
  document.querySelectorAll('.mcard').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.detail').forEach(d=>{d.classList.remove('open');d.innerHTML='';});
  card.classList.add('active');openMethod=`${si}-${mi}`;

  const nextLbl=isLastStage&&isLastMethod?'→ 当前前沿方向':isLastMethod?`→ 引出下一阶段：${D[si+1].title}`:'→ 为什么需要下一个方法';

  const stepsHtml=m.steps.map((s,i)=>`<li class="step-li"><span class="step-n">${i+1}</span><span class="step-txt"><strong>${s.t}</strong>：${s.d}</span></li>`).join('');
  const formulasHtml=m.formulas.map(f=>`<div class="formula-lbl">${f.lbl}</div><div class="formula">${f.f}</div>`).join('');
  const flowHtml=m.flows.map(fl=>`<div class="flow">${fl.map((seg,i)=>i%2===0?`<div class="fbox">${seg}</div>`:`<div class="farr">${seg}</div>`).join('')}</div>`).join('');

  det.innerHTML=`
    <div class="tabs">
      <div class="tab on" onclick="switchTab(this,'t-what-${si}-${mi}',${si},${mi})">简介</div>
      <div class="tab" onclick="switchTab(this,'t-steps-${si}-${mi}',${si},${mi})">步骤与公式</div>
      <div class="tab" onclick="switchTab(this,'t-pc-${si}-${mi}',${si},${mi})">优缺点</div>
      <div class="tab" onclick="switchTab(this,'t-why-${si}-${mi}',${si},${mi})">引出路径</div>
    </div>
    <div class="tab-body on" id="t-what-${si}-${mi}">
      <p class="what-txt">${m.what}</p>
    </div>
    <div class="tab-body" id="t-steps-${si}-${mi}">
      ${flowHtml}
      <ul class="step-list">${stepsHtml}</ul>
      ${formulasHtml}
    </div>
    <div class="tab-body" id="t-pc-${si}-${mi}">
      <div class="pro-con">
        <div class="pc pro"><div class="pclbl">优点 Pros</div>${m.pros.map(p=>`<div class="pci">${p}</div>`).join('')}</div>
        <div class="pc con"><div class="pclbl">缺点 Cons</div>${m.cons.map(c=>`<div class="pci">${c}</div>`).join('')}</div>
      </div>
    </div>
    <div class="tab-body" id="t-why-${si}-${mi}">
      <div class="why"><div class="why-lbl">${nextLbl}</div><div class="why-txt">${m.why}</div></div>
    </div>`;
  det.classList.add('open');
}

function switchTab(el,targetId,si,mi){
  const det=document.getElementById(`det-${si}`);
  det.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  det.querySelectorAll('.tab-body').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  document.getElementById(targetId).classList.add('on');
}

D.forEach((_,si)=>toggleStage(si));
</script>
